name: Grabar Montecarlo 6:30am

on:
  repository_dispatch:
    types: [grabar]
  workflow_dispatch:

jobs:
  grabar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Instalar ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Grabar 10 minutos del stream
        run: |
          FECHA=$(TZ="America/Montevideo" date +%Y-%m-%d)
          HORA=$(TZ="America/Montevideo" date +%H%M)
          NOMBRE="episodio-${FECHA}-${HORA}"
          echo "Grabando ${NOMBRE}..."
          ffmpeg -i "https://streamingcasazorrilla.innovanexo.com:8000/montecarlo.mp3" \
            -t 600 \
            -acodec libmp3lame \
            -ab 128k \
            -y \
            "${NOMBRE}.mp3"
          echo "FECHA=${FECHA}" >> $GITHUB_ENV
          echo "HORA=${HORA}" >> $GITHUB_ENV
          echo "NOMBRE=${NOMBRE}" >> $GITHUB_ENV

      - name: Subir MP3 como Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: "ep-${{ env.FECHA }}-${{ env.HORA }}"
          name: "Montecarlo - ${{ env.FECHA }} ${{ env.HORA }}"
          body: "Grabación de Radio Montecarlo CX20 - ${{ env.FECHA }} ${{ env.HORA }}"
          files: "${{ env.NOMBRE }}.mp3"

      - name: Esperar que GitHub procese el release
        run: sleep 30

      - name: Actualizar feed RSS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 generar_rss.py

      - name: Commit y push del RSS actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git commit -m "RSS actualizado ${{ env.FECHA }}-${{ env.HORA }}" || echo "Sin cambios"
          git pull --rebase origin main
          git push

      - name: Borrar episodios viejos (más de 30 días)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,publishedAt \
          | python3 -c "
          import json, sys, subprocess, datetime
          releases = json.load(sys.stdin)
          cutoff = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(days=30)
          for r in releases:
              fecha = datetime.datetime.fromisoformat(r['publishedAt'].replace('Z','+00:00'))
              if fecha < cutoff:
                  subprocess.run(['gh', 'release', 'delete', r['tagName'], '--yes', '--cleanup-tag'])
                  print(f'Borrado: {r[\"tagName\"]}')
          "