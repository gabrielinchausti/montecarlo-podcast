name: Grabar Montecarlo 6:30am

on:
  schedule:
    - cron: '0 9 * * *'   # 6:00 AM Uruguay (UTC-3) — graba 1 hora
  workflow_dispatch:

jobs:
  grabar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Instalar ffmpeg y dependencias Python
        run: |
          sudo apt-get install -y ffmpeg
          pip install openai --break-system-packages

      - name: Grabar 1 hora del stream
        run: |
          FECHA=$(TZ="America/Montevideo" date +%Y-%m-%d)
          echo "Grabando 1 hora desde las 6:00..."
          ffmpeg -i "https://streamingcasazorrilla.innovanexo.com:8000/montecarlo.mp3" \
            -t 3600 \
            -acodec libmp3lame \
            -ab 64k \
            -y \
            "hora-completa-${FECHA}.mp3"
          echo "FECHA=${FECHA}" >> $GITHUB_ENV

      - name: Procesar audio con OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          HORA="0630"
          NOMBRE="episodio-${{ env.FECHA }}-${HORA}"
          python3 procesar_audio.py \
            "hora-completa-${{ env.FECHA }}.mp3" \
            "${NOMBRE}.mp3"
          echo "HORA=${HORA}" >> $GITHUB_ENV
          echo "NOMBRE=${NOMBRE}" >> $GITHUB_ENV

      - name: Subir MP3 como Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: "ep-${{ env.FECHA }}-${{ env.HORA }}"
          name: "Montecarlo - ${{ env.FECHA }} ${{ env.HORA }}"
          body: "Informativo 6:30 AM de Radio Montecarlo CX20 - ${{ env.FECHA }}"
          files: "${{ env.NOMBRE }}.mp3"

      - name: Esperar que GitHub procese el release
        run: sleep 30

      - name: Actualizar feed RSS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 generar_rss.py

      - name: Commit y push del RSS actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git commit -m "RSS actualizado ${{ env.FECHA }}-0630" || echo "Sin cambios"
          git pull --rebase origin main
          git push

      - name: Borrar episodios viejos (más de 30 días)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,publishedAt \
          | python3 -c "
          import json, sys, subprocess, datetime
          releases = json.load(sys.stdin)
          cutoff = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(days=30)
          for r in releases:
              fecha = datetime.datetime.fromisoformat(r['publishedAt'].replace('Z','+00:00'))
              if fecha < cutoff:
                  subprocess.run(['gh', 'release', 'delete', r['tagName'], '--yes', '--cleanup-tag'])
                  print(f'Borrado: {r[\"tagName\"]}')
          "